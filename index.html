<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cinecito de Juan & Adi — te amo cariño 💚</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:," />
</head>
<body>
<div class="bg-ornament" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="site-header">
    <h1 class="title">
        <span class="accent">Juan</span> & <span class="accent">Adi</span>
        <span class="tiny">presentan</span>
        <span class="feature">Los Caballeros</span>
    </h1>
    <p class="tagline">Nuestro tiempo de peli — tú, yo y ni idea lo que será 💚🌻</p>
</header>

<main class="container">
    <!-- Reproductor simplificado -->
    <section class="player-shell">
        <iframe
                src="https://drive.google.com/file/d/1Ao6bZNJfbJXfNfTKdpTK2gCkZ5yYoc7p/preview"
                allow="autoplay; fullscreen"
                frameborder="0 "
                class="drive-iframe"
        ></iframe>

        <!-- Botón del corazón flotante -->
        <button id="loveBtn" class="heart-btn" aria-label="Mostrar mensaje de amor">💚</button>

        <!-- Contenedor para mensajes de amor -->
        <div id="loveNote" class="love-note" hidden></div>
    </section>
</main>

<footer class="site-footer">
    Hecho con cariño por Juan para Adi — <span class="year"></span> 💚🌻
</footer>

<script src="script.js"></script>
</body>
</html>
